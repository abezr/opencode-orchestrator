services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opencode
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  agentcore-mock:
    image: python:3.11-slim
    working_dir: /app
    command: sh -lc "pip install -e . && uvicorn cmd.agentcore_mock.main:app --host 0.0.0.0 --port 9001"
    ports:
      - "9001:9001"
    volumes:
      - ../../:/app

  api:
    image: python:3.11-slim
    working_dir: /app
    command: sh -lc "pip install -e . && uvicorn cmd.api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      APP_PROFILE: dev-openrouter-free
      POSTGRES_DSN: postgresql://app:app@postgres:5432/opencode
      QDRANT_URL: http://qdrant:6333
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      AGENTCORE_ENABLED: "true"
      AGENTCORE_MODE: http_client
      AGENTCORE_BASE_URL: http://agentcore-mock:9001
      AGENTCORE_TIMEOUT_SECONDS: 5
      AGENTCORE_FALLBACK_TO_STUB_ON_ERROR: "true"
    volumes:
      - ../../:/app
    depends_on:
      - postgres
      - qdrant
      - agentcore-mock

volumes:
  postgres_data:
  qdrant_storage:
