services:
  bedrock-demo:
    image: python:3.11-slim
    working_dir: /app
    command: sh -lc "pip install -e . && uvicorn cmd.bedrock_demo.main:app --host 0.0.0.0 --port 8010"
    ports:
      - "8010:8010"
    environment:
      APP_PROFILE: dev-openrouter-free
      AWS_REGION: ${AWS_REGION:-us-east-1}
      BEDROCK_ENABLED: "true"
      BEDROCK_RUNTIME_MODEL_ID: ${BEDROCK_RUNTIME_MODEL_ID:-}
      BEDROCK_KNOWLEDGE_BASE_ID: ${BEDROCK_KNOWLEDGE_BASE_ID:-}
      BEDROCK_KNOWLEDGE_MODEL_ID: ${BEDROCK_KNOWLEDGE_MODEL_ID:-}
      BEDROCK_FLOW_IDENTIFIER: ${BEDROCK_FLOW_IDENTIFIER:-}
      BEDROCK_FLOW_ALIAS_IDENTIFIER: ${BEDROCK_FLOW_ALIAS_IDENTIFIER:-}
      BEDROCK_ENABLE_TRACE: ${BEDROCK_ENABLE_TRACE:-true}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    volumes:
      - ../../:/app
