services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  api:
    image: python:3.11-slim
    working_dir: /app
    command: bash -lc "pip install -e . && uvicorn cmd.api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      APP_PROFILE: dev-openrouter-free
      QDRANT_URL: http://qdrant:6333
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    volumes:
      - ../../:/app
    depends_on:
      - qdrant

volumes:
  qdrant_storage:
