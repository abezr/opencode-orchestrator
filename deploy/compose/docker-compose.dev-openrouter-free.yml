services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opencode
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  api:
    image: python:3.11-slim
    working_dir: /app
    command: sh -lc "pip install -e . && uvicorn cmd.api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      APP_PROFILE: dev-openrouter-free
      POSTGRES_DSN: postgresql://app:app@postgres:5432/opencode
      QDRANT_URL: http://qdrant:6333
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    volumes:
      - ../../:/app
    depends_on:
      - postgres
      - qdrant

volumes:
  postgres_data:
  qdrant_storage:
