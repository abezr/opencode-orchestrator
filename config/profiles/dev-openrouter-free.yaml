app:
  name: opencode-orchestrator
  env: dev
  host: 0.0.0.0
  port: 8000

inference:
  provider: openrouter
  model: openrouter/free
  fallback_models:
    - meta-llama/llama-3.2-3b-instruct:free
    - nvidia/nemotron-3-nano-30b-a3b:free
  timeout_seconds: 30
  max_tokens: 512
  temperature: 0.2
  stub_if_missing_api_key: true

openrouter:
  base_url: https://openrouter.ai/api/v1
  app_name: opencode-orchestrator
  site_url: http://localhost:8000

qdrant:
  url: http://localhost:6333
  collection_name: knowledge_snippets
  vector_size: 16
  enabled: true
  bootstrap_demo_data: true

postgres:
  dsn: postgresql://app:app@postgres:5432/opencode

agentcore:
  enabled: false
  mode: external_stub
  base_url: http://localhost:9001
  timeout_seconds: 5
  gateway_name: support-gateway
  policy_name: refund-approval-policy
  approval_required_actions:
    - support.request_refund
    - support.issue_compensation
  blocked_actions: []
